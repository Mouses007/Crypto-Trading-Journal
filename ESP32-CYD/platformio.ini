[env:esp32dev]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  bblanchon/ArduinoJson @ ^7.0.0

build_flags =
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_MOSI=45
  -DTFT_MISO=-1
  -DTFT_SCLK=40
  -DTFT_CS=42
  -DTFT_DC=41
  -DTFT_RST=39
  -DTFT_BL=5
  -DTFT_BACKLIGHT_ON=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTOUCH_CS=-1
  -DSPI_FREQUENCY=40000000
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT6=1
  -DLOAD_FONT7=1
  -DLOAD_FONT8=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
