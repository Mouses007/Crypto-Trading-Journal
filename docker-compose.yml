services:
  journal:
    image: mouses007/trading-journal:latest
    container_name: crypto-trading-journal
    ports:
      - "${CTJ_PORT:-8080}:8080"
    environment:
      - CTJ_SECRET=${CTJ_SECRET}
      - DB_TYPE=${DB_TYPE:-postgresql}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    env_file:
      - .env
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-journal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
    command: crypto-trading-journal
    restart: unless-stopped
